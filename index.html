<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NASCAR Pool 2026 moved</title>

  <style>
    :root{
      --bg:#020b12;
      --text:#ffffff;
      --muted:rgba(255,255,255,.78);
      --accent:#FFD659;
      --link:#4fc3ff;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      min-height:100%;
      background:var(--bg);
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
      color:var(--text);
      text-align:center;
    }

    .wrap{
      max-width:720px;
      width:100%;
    }

    .moved-img{
      display:block;
      width:min(100%, 420px);
      max-height:420px;
      object-fit:contain;
      margin:0 auto 24px;
    }

    h1{
      margin:0 0 12px;
      font-size:clamp(30px, 5vw, 48px);
      line-height:1.05;
    }

    p{
      margin:0 0 14px;
      font-size:clamp(16px, 2.4vw, 20px);
      line-height:1.45;
      color:var(--muted);
    }

    .highlight{
      color:var(--accent);
      font-weight:800;
    }

    .link-btn{
      display:inline-block;
      margin-top:10px;
      padding:14px 20px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      color:var(--link);
      text-decoration:none;
      font-weight:800;
      font-size:18px;
    }

    .link-btn:hover{
      background:rgba(255,255,255,.12);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <!-- Upload your image file into the same folder as this HTML -->
    <img class="moved-img" src="page-moved.png" alt="This page has moved">

    <h1>This page done got the hell outta here.</h1>

    <p>
      The old NASCAR page has been retired because, well, the engine sucked.
      The new one got the 750hp upgrade that the cup cars got. Hope you enjoyed
      the eye candy.
    </p>

    <p>
      The <span class="highlight">new page lives here</span>:
    </p>

    <a class="link-btn" href="https://YOUR-NEW-URL-HERE.com" target="_self">
      Go to the new page
    </a>
  </main>
</body>
</html>
